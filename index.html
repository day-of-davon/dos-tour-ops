<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DOS Tour Ops" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎤</text></svg>" />
    <title>DOS Tour Ops</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      :root, html[data-theme="dark"] {
        /* Delta-inspired dark: deep navy surfaces, crimson accent, silver text */
        --bg: #000B2C;
        --card: #001E3C;
        --card-2: #002B4E;
        --card-3: #003366;
        --card-4: #012654;
        --text: #FFFFFF;
        --text-2: #C5C9D3;
        --text-3: #A9B1BF;
        --text-dim: #8A94A6;
        --text-mute: #6B7689;
        --text-faint: #4E5A6E;
        --border: #1A3560;
        --accent: #14B8A6;
        --accent-soft: #2DD4BF;
        --navy: #003366;
        --link: #4FA3E3;
        --accent-pill-bg: #0A2A28;
        --accent-pill-border: #14665E;
        --success-bg: #0A2E22;
        --success-fg: #6EE7B7;
        --warn-bg: #2B1C05;
        --warn-fg: #FCD34D;
        --danger-bg: #3A0909;
        --danger-fg: #F87171;
        --info-bg: #0A1F3D;
        --info-fg: #93C5FD;
        --muted-bg: #1A1F2C;
      }
      html[data-theme="light"] {
        /* Delta-inspired light: white surfaces, navy structure, crimson accent */
        --bg: #F4F5F7;
        --card: #FFFFFF;
        --card-2: #F9FAFB;
        --card-3: #F1F3F6;
        --card-4: #E8ECF1;
        --text: #0A1F3D;
        --text-2: #334155;
        --text-3: #475569;
        --text-dim: #64748B;
        --text-mute: #94A3B8;
        --text-faint: #B0B8C4;
        --border: #D6DBE2;
        --accent: #0D9488;
        --accent-soft: #14B8A6;
        --navy: #003366;
        --link: #0D6EBF;
        --accent-pill-bg: #CCFBF1;
        --accent-pill-border: #5EEAD4;
        --success-bg: #D1FAE5;
        --success-fg: #047857;
        --warn-bg: #FEF3C7;
        --warn-fg: #92400E;
        --danger-bg: #FEE2E2;
        --danger-fg: #B91C1C;
        --info-bg: #DBEAFE;
        --info-fg: #1D4ED8;
        --muted-bg: #F9FAFB;
      }
      body { background: var(--bg); color: var(--text); transition: background 120ms ease, color 120ms ease; }
    </style>
    <script>
      (function() {
        try {
          var t = localStorage.getItem("dos-theme") || "dark";
          document.documentElement.setAttribute("data-theme", t);
        } catch(e) { document.documentElement.setAttribute("data-theme", "dark"); }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
