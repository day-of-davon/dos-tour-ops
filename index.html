<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DOS Tour Ops" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎤</text></svg>" />
    <title>DOS Tour Ops</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      :root, html[data-theme="dark"] {
        --bg: #0a0a0f;
        --card: #12121a;
        --card-2: #1e1e2e;
        --text: #e4e4ef;
        --text-dim: #a0a0b8;
        --text-mute: #707088;
        --border: #2a2a3a;
        --accent: #5B21B6;
        --accent-soft: #7c3aed;
      }
      html[data-theme="light"] {
        --bg: #F5F3EF;
        --card: #ffffff;
        --card-2: #faf8f4;
        --text: #0f172a;
        --text-dim: #64748b;
        --text-mute: #94a3b8;
        --border: #d6d3cd;
        --accent: #5B21B6;
        --accent-soft: #7c3aed;
      }
      body { background: var(--bg); color: var(--text); transition: background 120ms ease, color 120ms ease; }
    </style>
    <script>
      (function() {
        try {
          var t = localStorage.getItem("dos-theme") || "dark";
          document.documentElement.setAttribute("data-theme", t);
        } catch(e) { document.documentElement.setAttribute("data-theme", "dark"); }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
